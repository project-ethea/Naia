#textdomain wesnoth-Naia

[unit_type]
	id=Elvish Wayfarer
	name= _ "Elvish Wayfarer"
    race=elf
    image="units/elves-wood/wayfarer.png"
    profile="portraits/galas.webp"
    hitpoints=46
    movement_type=woodland
    {LESS_NIMBLE_ELF}
    movement=5
    experience=28
    level=4
    alignment=neutral
    advances_to=null
    {AMLA_TREE:GALAS}
    cost=98
    usage=fighter
    description= _ "While the elves of the Valley of Elynia have laws guaranteeing hospitality to visitors from the dunes, hostile invasion attempts are far too frequent for them to afford leaving their borders unguarded.

All members of the Border Patrol have a sworn duty to elvenkind, and from a very young age undergo the most rigorous training. Their diligent study and practice of advanced fight and survival tactics allows them to overcome the natural skills of those born amidst the eternal strife of the desert."
    die_sound={SOUND_LIST:ELF_HIT}

	[attack]
        name=sword
        description=_"sword"
        icon=attacks/sword-elven.png
        type=blade
        range=melee
        damage=8
        number=4
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-elven.png
        type=pierce
        range=ranged
        damage=8
        number=3
    [/attack]

	{DEFENSE_ANIM "units/elves-wood/wayfarer.png" "units/elves-wood/wayfarer.png" {SOUND_LIST:ELF_HIT} }

	[attack_anim]
        [filter_attack]
            name=bow
        [/filter_attack]

        missile_start_time=-150
        [missile_frame]
            duration=150
            image="projectiles/missile-n.png"
            image_diagonal="projectiles/missile-ne.png"
        [/missile_frame]

        start_time=-445
        [frame]
            image="units/elves-wood/wayfarer.png:510"
        [/frame]

        {SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]

        start_time=-200

        [frame]
            image="units/elves-wood/wayfarer.png:300"
        [/frame]

        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -100}
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=bolas
        [/filter_attack]

        {MISSILE_FRAME_BOLAS}

        start_time=-300
        [frame]
            image="units/elves-wood/wayfarer.png:300"
        [/frame]

        {SOUND:HIT_AND_MISS hatchet.wav hatchet-miss.wav -300}
    [/attack_anim]
[/unit_type]

