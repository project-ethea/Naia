#textdomain wesnoth-Naia

[unit_type]
	id=Elvish Field Steward
	name= _ "Elvish Field Steward"
    race=elf
    image="units/elves-wood/hero.png"
    profile="portraits/galas.webp"
    hitpoints=39
    movement_type=woodland
    {LESS_NIMBLE_ELF}
    movement=5
    experience=38
    level=2
    alignment=neutral
    #advances_to=Elvish Pathfinder
    {AMLA_TREE:GALAS}
    cost=34
    usage=fighter
    description= _ "FIXME"
    die_sound={SOUND_LIST:ELF_HIT}

	[attack]
        name=sword
        description=_"sword"
        icon=attacks/sword-elven.png
        type=blade
        range=melee
        damage=7
        number=4
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-elven.png
        type=pierce
        range=ranged
        damage=5
        number=3
    [/attack]

    {DEFENSE_ANIM_RANGE "units/elves-wood/hero-defend.png" "units/elves-wood/hero.png" {SOUND_LIST:ELF_HIT} melee }
    {DEFENSE_ANIM_RANGE "units/elves-wood/hero-bow-defend.png" "units/elves-wood/hero-bow.png" {SOUND_LIST:ELF_HIT} ranged }

	[attack_anim]
        [filter_attack]
            name=bow
        [/filter_attack]
        missile_start_time=-150
        [missile_frame]
            duration=150
            image="projectiles/missile-n.png"
            image_diagonal="projectiles/missile-ne.png"
        [/missile_frame]
        start_time=-445
        [frame]
            image="units/elves-wood/hero-bow.png:65"
        [/frame]
        {SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
        [frame]
            image="units/elves-wood/hero-bow-attack[1~4].png:[75*2,100,130]"
        [/frame]
        [frame]
            image="units/elves-wood/hero-bow.png:65"
        [/frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]
        start_time=-200
        [frame]
            image="units/elves-wood/hero.png:25"
        [/frame]
        [frame]
            image="units/elves-wood/hero-melee-[1~4].png:[65,35,150,45]"
        [/frame]
        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -75}
        [frame]
            image="units/elves-wood/hero-defend.png:60"
        [/frame]
        [frame]
            image="units/elves-wood/hero.png:20"
        [/frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=bolas
        [/filter_attack]

        {MISSILE_FRAME_BOLAS}

        start_time=-300
        [frame]
            image="units/elves-wood/hero.png:300"
        [/frame]

        {SOUND:HIT_AND_MISS hatchet.wav hatchet-miss.wav -300}
    [/attack_anim]
[/unit_type]
