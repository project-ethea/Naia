#textdomain wesnoth-Naia

[unit_type]
	id=Elvish Patrol Captain
	name= _ "Elvish Patrol Captain"
    race=elf
    image="units/elves-wood/fighter/fighter.png"
    profile="portraits/galas.webp"
    hitpoints=32
    movement_type=woodland
    {LESS_NIMBLE_ELF}
    movement=5
    experience=22
    level=1
    alignment=neutral
    #advances_to=Elvish Field Steward
    {AMLA_TREE:GALAS}
    cost=19
    usage=fighter
    description= _ "While the elves of the Valley of Elynia have laws guaranteeing hospitality to visitors from the dunes, hostile invasion attempts are far too frequent for them to afford leaving their borders unguarded.

All members of the Border Patrol have a sworn duty to elvenkind, and from a very young age undergo the most rigorous training. Their diligent study and practice of advanced fight and survival tactics allows them to overcome the natural skills of those born amidst the eternal strife of the desert."
    die_sound={SOUND_LIST:ELF_HIT}

	[attack]
        name=sword
        description=_"sword"
        icon=attacks/sword-elven.png
        type=blade
        range=melee
        damage=5
        number=4
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-elven.png
        type=pierce
        range=ranged
        damage=3
        number=3
    [/attack]

	{DEFENSE_ANIM_RANGE "units/elves-wood/fighter/fighter-defend2.png" "units/elves-wood/fighter/fighter-defend.png" {SOUND_LIST:ELF_HIT} melee }
    {DEFENSE_ANIM_RANGE "units/elves-wood/fighter/fighter-bow-defend2.png" "units/elves-wood/fighter/fighter-bow-defend1.png" {SOUND_LIST:ELF_HIT} ranged }

	[movement_anim]
        start_time=0
        [frame]
            image="units/elves-wood/fighter/fighter-se-run[1~10].png:60"
        [/frame]
    [/movement_anim]

	[attack_anim]
        [filter_attack]
            name=bow
        [/filter_attack]
        missile_start_time=-150
        [missile_frame]
            duration=150
            image="projectiles/missile-n.png"
            image_diagonal="projectiles/missile-ne.png"
        [/missile_frame]
        start_time=-445
        [frame]
            image="units/elves-wood/fighter/fighter-bow.png:65"
        [/frame]
        {SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
        [frame]
            image="units/elves-wood/fighter/fighter-bow-attack[1~4].png:[75*2,100,130]"
        [/frame]
        [frame]
            image="units/elves-wood/fighter/fighter-bow.png:65"
        [/frame]
    [/attack_anim]

	[attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]
        start_time=-275
        offset=0.0:125,0.0~0.6:150,0.6~0.0:180
        [frame]
            image="units/elves-wood/fighter/fighter-melee-1.png:155"
        [/frame]
        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -150}
        [frame]
            image="units/elves-wood/fighter/fighter-melee-[2,3,4].png:[80,80,125]"
        [/frame]
        [frame]
            image="units/elves-wood/fighter/fighter.png:15"
        [/frame]
    [/attack_anim]

	[attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]
        start_time=-275
        offset=0.0:125,0.0~0.6:150,0.6~0.0:180
        [frame]
            image="units/elves-wood/fighter/fighter-melee-[1~4].png:[155,80,80,125]"
        [/frame]
        [frame]
            image="units/elves-wood/fighter/fighter.png:15"
        [/frame]
        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -150}
    [/attack_anim]

	[attack_anim]
        [filter_attack]
            name=sword
        [/filter_attack]
        # make it less common than the previous one
        frequency=2
        start_time=-345
        offset=0.0:195,0.0~0.6:150,0.6~0.0:180
        [frame]
            image="units/elves-wood/fighter/fighter-melee-[1~5]b.png:[90,90,125,80,125]"
        [/frame]
        [frame]
            image="units/elves-wood/fighter/fighter.png:15"
        [/frame]
        {SOUND:HIT_AND_MISS {SOUND_LIST:SWORD_SWISH} {SOUND_LIST:MISS} -150}
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=bolas
        [/filter_attack]

        {MISSILE_FRAME_BOLAS}

        start_time=-300
        [frame]
            image="units/elves-wood/fighter/fighter.png:300"
        [/frame]

        {SOUND:HIT_AND_MISS hatchet.wav hatchet-miss.wav -300}
    [/attack_anim]
[/unit_type]
