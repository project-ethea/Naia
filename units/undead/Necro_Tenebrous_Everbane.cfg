#textdomain wesnoth-Naia

[unit_type]
    id=Tenebrous Everbane
    name= _ "Tenebrous Everbane"
    race=undead
    image="units/undead-necromancers/ancient-lich.png"
    profile="portraits/mal-keshar.webp"
    hitpoints=99
    movement_type=undeadfoot
    movement=6
    experience=250
    level=5
    alignment=chaotic
    advances_to=null
	{AMLA_DEFAULT} # No AMLAs in this state
    cost=244
    usage=mixed fighter
    # po: The first two paragraph of this unit type description are shared
	# po: among three unit types: Archaic Lich, Undying Eradicator, and
	# po: Tenebrous Everbane.
	description= _ "To most denizens of the world of the living, necromancy is synonymous with depravation beyond forgiveness, a violation of the sacred natural order of the cosmos, a practice outlawed by every manner of sapient creature on Irdya. Yet, some purposefully disregard the warnings and dedicate their existence to the pursuit of the forbidden, eager to show the world how breaking free from their shackles of skin and flesh is the path to a greater destiny in a world fraught with decay and ruin.

While many necromancers through the ages have been known to attain lichdom, all of them have ultimately succumbed to the efforts of foolish heroes and their armies seeking to rid Irdya of their blight; all of them, except for one Mal Keshar, who mysteriously resurfaced many times during the Golden Age after—allegedly—having been struck down for good. Some theorize that this necromancer discovered the means to transcend the conventional nature of souls and endure no matter what became of his body — if true, then it is truly for the best that he never passed this knowledge onto others of his ilk."
    die_sound=lich-die.ogg
    {DEFENSE_ANIM "units/undead-necromancers/ancient-lich-defend.png" "units/undead-necromancers/ancient-lich.png" {SOUND_LIST:LICH_HIT} }
    [movement_costs]
        shallow_water=3
    [/movement_costs]
    [abilities]
        {ABILITY_SUBMERGE}
        {ABILITY_MALICE}
    [/abilities]
    [attack]
        name=touch
        description=_"touch"
        icon=attacks/touch-undead.png
        type=arcane
        range=melee
        damage=9
        number=4
        [specials]
            {WEAPON_SPECIAL_DRAIN}
			{WEAPON_SPECIAL_PLAGUE_TYPE Soulless}
        [/specials]
    [/attack]
    [attack]
        name=frostborne erosion
        description=_"frostborne erosion"
        type=cold
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
			{WEAPON_SPECIAL_MARK}
        [/specials]
        range=ranged
        damage=15
        number=5
        icon=attacks/iceball.png
    [/attack]
    [attack]
        name=calamitous surge
        description=_"calamitous surge"
        type=arcane
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
        range=ranged
        damage=12
        number=6
        icon=attacks/dark-missile.png
    [/attack]

    [idle_anim]
        {STANDARD_IDLE_FILTER}
        start_time=0
        [frame]
            duration=2310
            image="units/undead-necromancers/ancient-lich.png"
            halo=halo/undead/idle-flash-[1~21].png
            halo_x=6~0,0
            halo_y=-6~0,0
        [/frame]
    [/idle_anim]

    [recruiting_anim]
        [filter_second]
            race=undead
        [/filter_second]
        start_time=-300
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-[1,2].png:75"
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-3.png"
            halo=halo/undead/black-magic-[1~5].png:[75*4,50]
        [/frame]
        sound_start_time=-75
        [sound_frame]
            sound=magic-dark-big.ogg
        [/sound_frame]
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-[2,1].png:50"
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich.png:1"
        [/frame]
    [/recruiting_anim]
    [attack_anim]
        [filter_attack]
            name=chill tempest
        [/filter_attack]

        offset=0

        {MISSILE_FRAME_CHILL_TEMPEST 0 -15}

        start_time=-355
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-[1,2].png:75"
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-3.png"
            halo=halo/undead/black-magic-[1~5].png:[75*4,50]
        [/frame]
        {SOUND:HIT_AND_MISS magic-dark-big.ogg magic-dark-big-miss.ogg -150}
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-[2,1].png:50"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=shadow wave
        [/filter_attack]

        {MISSILE_FRAME_SHADOW_WAVE}

        start_time=-675
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-[1,2].png:75"
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-3.png"
            halo=halo/undead/black-magic-[1~5].png:[75*4,50]
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-3.png:200"
        [/frame]
        {SOUND:HIT_AND_MISS magic-dark-big.ogg magic-dark-big-miss.ogg -50}
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-[2,1].png:50"
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich.png:50"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=touch
        [/filter_attack]
        start_time=-250
        [frame]
            image="units/undead-necromancers/ancient-lich.png:50"
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich-melee-[1~2].png:[100,200]"
        [/frame]
        {SOUND:HIT_AND_MISS wail-sml.wav {SOUND_LIST:MISS} -100}
        [frame]
            image="units/undead-necromancers/ancient-lich-magic-1.png:75"
        [/frame]
        [frame]
            image="units/undead-necromancers/ancient-lich.png:75"
        [/frame]
    [/attack_anim]
[/unit_type]
