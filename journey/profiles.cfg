#textdomain wesnoth-Naia
#
# Because there is a lot of JourneyLog data shared between IftU and AtS, this
# information needs to be provided by Naia in order to avoid duplicating prose
# editing and translation work. Unfortunately, this means the structure of it
# is rather complex for what was originally supposed to be a proof-of-concept.
#
# JourneyLog information starts by assuming IftU as a baseline. When AtS is
# launched, the IftU milestones are automatically granted during Lua
# initialization, thus ensuring that all IftU information is already "known"
# by the player. AtS-specific information, on the other hand, is split between
# three episodes, necessitating some WML preprocessor trickery since we cannot
# currently do checks like `#if defined(A) || defined(B)` in a single line.
#

[character_profile]
	id=Galas
	name= _ "Galas"
	affiliation= _ "Valley of Elynia"
	race=elf
	gender=male
	portrait="portraits/galas.webp"
	help_unit_type=Elvish Patrol Captain
	description= _ "<b>Galas</b>, son of the late Captain Valthir, is a member of the southern border patrol of the Valley of Elynia. Although born in the lush and cozy forests of the inner Valley, from a very young age he took a liking to accompanying his father in expeditions to safeguard the Valley from hostile outsiders, learning the ins and outs of survival in the desert."

	[additional_info]
		requires_milestone=joined_alliance
		affiliation= _ "Alliance of the Peoples of the Far North"
		description= _ "As part of a barter to secure a new home for the forest elves in the Far North, Galas pledged to join the Grand Council of the Northern Peoples, along with Elynia and Mal Keshar. While doing so, he also renounced his leadership of the elves, letting Lord Inodien take over his duties."
	[/additional_info]

	[additional_info]
		requires_milestone=escaped_kalari
		status=dead
		description= _ "On the way back from Zocthanol Isle, Galas’s group was caught in a storm and forced to make landfall in <b>Kalari Peninsula</b>, the location of the <b>Iron Council</b> headquarters. Galas and Elynia were both captured by Chaos forces during a struggle, resulting in a disastrous breakout attempt where the two of them and Mal Keshar became lost in an underground facility.

While debating the best way to solve their predicament, the group was ambushed by Elyssa, who emerged from the shadows and fatally struck Galas from behind before anyone could react. Elynia and Mal Keshar narrowly escaped via the use of teleport magic, but were ultimately unable to retrieve the elf’s body."
	[/additional_info]
[/character_profile]

# Anlindë is strictly speaking an IftU character. However, we don't have the
# means to force her to be displayed next to Galas at all times; we can't move
# her to IftU's JourneyLog data without her winding up at the bottom of the
# character list (or alternatively having her at the top...) so we instead
# define her in Naia and keep her around in AtS for convenience's sake.

[character_profile]
	id=Anlindë
	name= _ "Anlindë"
	affiliation= _ "Valley of Elynia"
	race=elf
	gender=female
#ifdef CAMPAIGN_INVASION_FROM_THE_UNKNOWN
	portrait="portraits/anlinde.webp"
	help_unit_type=Anlinde Elvish Ascetic
#endif
	description= _ "While elves normally live for approximately three hundred years, <b>Anlindë</b> is a rare exception whose presence in the Valley of Elynia is rumored to predate the very existence of the settlement.

Throughout the ages, Anlindë has dedicated herself to the tedious yet crucial labor of record keeping for the valley’s governing council at Telchior’s Keep, thus ensuring that old elven crafts and traditions—especially those pertaining to the use of faerie magic—remain alive long after the Great Fall. In more recent times however, her focus has largely shifted away from desk jobs into tending to the sick and wounded, putting her unrivaled mastery of herbal medicine into more practical uses.

Since Captain Valthir’s unfortunate demise, Anlindë has taken care of his only son <b>Galas</b> as if he were her own, even arranging for him to be personally tutored by Lord Lédinor despite his father being a complete outsider to the council."

	[additional_info]
		requires_milestone=malin_encountered
		description= _ "During the elves’ first encounter with Mal Keshar, Anlindë’s magical prowess proved far greater than suspected by anyone, as a single spell—of a nature unknown to even the necromancer—allowed her to weaken him enough for Galas and others to finish the job. Entirely unexpected to her, however, was Galas and the lich’s mutual willingness to converse civilly; and even more unexpected was how this would lead to an impromptu alliance without precedent in elven history."
	[/additional_info]

	[additional_info]
		requires_milestone=elynia_encountered
		description= _ "Upon meeting the <b>Lady of Light Elynia</b>, Galas, Mal Keshar, and Lady Unarye learned the hidden truth behind Anlindë’s existence: she was once part of the dark cult serving the <b>Demon Lord Zhangor</b> in Wesmere; despite all the other priests having been executed to prevent a resurgence of the wicked creature, Lord Telchior of Thelien chose to spare her life alone for undisclosed reasons.

In spite of this relevation, it was evident to all that Anlindë had dedicated every instant of her continued existence to atoning for her sins against elvenkind; not only that, but her advice to Lord Telchior became directly responsible for the discovery of the valley which served as the forest elves’ sanctuary for countless generations."
	[/additional_info]

	[additional_info]
		requires_milestone=anlinde_end
		status=dead
		# po: Keep "Chaos Warlord" gender-ambiguous if your language allows it
		# po: since this text will be visible in game before Elyssa's proper
		# po: reveal in S22A.
		description= _ "In order to buy King Asthorgar and Galas time to evacuate Herthgar before the Chaos Warlord’s final siege attempt, Anlindë chose to stay behind and defend the capital with the asistance of Mal Keshar’s minions and a few dwarven troops. Everybody knew that it would be extremely unlikely for her to survive the encounter, and indeed, she never returned from her mission. Her sacrifice was not in vain, however, as it allowed the evacuation to proceed mostly as planned with minimal loss of life."
	[/additional_info]

[/character_profile]

[character_profile]
	id=Mal Keshar
	name= _ "Mal Keshar"
#ifdef CAMPAIGN_INVASION_FROM_THE_UNKNOWN
	requires_milestone=malin_encountered
#endif
	race=undead
	gender=male
	portrait="portraits/mal-keshar.webp"
	help_unit_type=Archaic Lich
	description= _ "<b>Mal Keshar</b> — formerly <b>Malin Keshar</b> — is an ancient Lich from the times before the Fall, hailing from the old human kingdom known as <b>Wesnoth</b>.

His origins can be traced back to the border town of Parthyn, at the time afflicted by constant orcish incursions. The timely intervention of a necromancer known as <b>Darken Volk</b> during a battle which cost Parthyn many lives, including that of Malin Keshar’s father, prompted the young boy to begin his travels and apprenticeship under the dark mage. While his master’s fate has been lost to history, what is known is that Malin Keshar attained lichdom and became the bane of the orcish tribes for a thousand years."

	[additional_info]
		requires_milestone=joined_alliance
		affiliation= _ "Alliance of the Peoples of the Far North"
		description= _ "As part of Galas’s barter to secure a new home for the forest elves in the Far North, Mal Keshar pledged allegiance to the <b>Grand Council of the Northern Peoples</b>."
	[/additional_info]

	[additional_info]
		requires_milestone=emperor_defeated
		description= _ "Mal Keshar proved a decisive factor in overcoming the obstacles Galas’s group encountered on their way to the lair of the <b>Chaos Emperor</b> in Inferno. Unfortunately, the severe amount of damage he sustained from fighting Elyssa, Argan, and Elynia in quick succession caused his power to wane considerably. Despite this, Mal Keshar continued to be a force to be reckoned with, rivaling even the most powerful priests and necromancers at Uria’s service."
	[/additional_info]

#ifdef CAMPAIGN_AFTER_THE_STORM
	[additional_info]
		requires_milestone=After_the_Storm_I
		status=dead
		description= _ "At the end of the group’s confrontation with the empowered <b>Shaxthal Queen</b> at the Wesmere Hive’s Abaddon facility, Mal Keshar and all his undead minions were caught in the massive whirlpool of energy released from the beast’s shattered core, causing his soul to be forcibly released from his body. Only minutes after, the entire facility along with the ruined plains of Wesmere completely vanished off the face of Irdya."
	[/additional_info]
#endif
[/character_profile]

#define PROFILE_ELYNIA_ARGAN_SHARED_BITS
    _ "Following their participation in the War of Wesmere, Elynia and Argan descended into the deepest reaches the Heart Mountains seeking answers regarding the Demon Lord and his place of origin. Tragically, an earthquake caused the earth to claim Argan’s life, not even leaving a body for Elynia to retrieve. Stricken with grief, the faerie requested the assistance of dwarves to seal her in a custom-built burial chamber, intending to lay dormant until the day Irdya would recover from complete devastation."
#enddef

#define PROFILE_ELYNIA_ARGAN_SHARED_BITS_2
	_ "Galas’s band confronted Argan in his own lair in the frozen wastes of Inferno, initially finding themselves completely outclassed by the sorcerer. However, Elynia’s ingenuity allowed her to fight him on equal ground by channeling the Power of the Union straight from him at close quarters. Despite <b>Uria</b> attempting to turn the tide by mutating and puppeteering Argan’s body, Elynia managed to subdue him with Galas and Mal Keshar’s help. Unable to find an alternative solution to her quandary, she struck at his heart with the full extent of her own power, thus putting an end to his sinister reign over Irdya."
#enddef

[character_profile]
	id=Elynia
	name= _ "Elynia, the Lady of Light"
	additional_titles= _ "Source of Light, Protector of the Elves of Irdya"
	affiliation= _ "Ka’lian of Wesmere (before the Fall)"
	race=faerie
	gender=female
	portrait="portraits/elynia.webp"
#ifdef CAMPAIGN_INVASION_FROM_THE_UNKNOWN
	help_unit_type=Lady of Light
	requires_milestone=elynia_encountered
#else
	help_unit_type=Sylvan Warden
#endif
	description= _ "Better known by elves and humans as the <b>Lady of Light</b> throughout history before the Fall, <b>Elynia</b> is one of the two heroes that once wielded the Union of Light and Darkness against Irdya’s greatest foe, the <b>Demon Lord Zhangor</b>.

Although very few records remain of her past life amongst elvenkind, it is believed that she was raised in the great woods of Wesmere by an enchantress who had close ties with the old Ka’lian. Having attained a seemingly eternal lifespan through her mastery of Light, Elynia once made a name for herself by achieving many feats as a wandering peace-keeper traveling all across the Great Continent. Although the civilizations of the Golden Era are long gone, a few hazy legends resulting from her participation in past events still linger in the public consciousness."+"

"+{PROFILE_ELYNIA_ARGAN_SHARED_BITS}

	[additional_info]
		requires_milestone=joined_alliance
		affiliation= _ "Alliance of the Peoples of the Far North, Ka’lian of Wesmere (before the Fall)"
		description= _ "As part of Galas’s barter to secure a new home for the forest elves in the Far North, Elynia pledged allegiance to the <b>Grand Council of the Northern Peoples</b>."
	[/additional_info]

	[additional_info]
        requires_milestone=emperor_defeated
        descrition= _ "Owing to twisted machinations of fate, Elynia’s partner <b>Argan</b>—once known as the <b>Master of Darkness</b> and co-wielder of the Union of Light and Darkness—became Uria’s most valued vassal and took upon the title of <b>Chaos Emperor</b>."+"

"+{PROFILE_ELYNIA_ARGAN_SHARED_BITS_2}
    [/additional_info]

#ifdef CAMPAIGN_AFTER_THE_STORM
	[additional_info]
		requires_milestone=quenoth_council
		additional_titles= _ "Source of Light, Protector of the Elves of Irdya, Eloh"
	[/additional_info]
#endif

#ifdef CAMPAIGN_AFTER_THE_STORM_EPISODE_III
	[additional_info]
		requires_milestone=capital_destroyed
		affiliation= _ "Alliance of the Peoples of the Far North (formerly), Ka’lian of Wesmere (before the Fall)"
	[/additional_info]

	[additional_info]
		requires_milestone=elynia_down
		description= _ "Sent by the <b>Demon Lord Ergea</b> in search of a “power hidden beneath Kalari”, Elynia confronted the <b>Chaos Warlord Elyssa</b> in an abandoned underground section of the stronghold. This time, the demoness made no secret of her possession of Yechnagoth’s legacy as the <b>Guardian of Darkness</b>, and promptly killed Elynia in combat."
	[/additional_info]

	[additional_info]
		requires_milestone=elynia_unleashed
		name= _ "Elynia, the Guardian of Earth"
		additional_titles= _ "Lady of Light, Source of Light, Protector of the Elves of Irdya, Eloh"
		affiliation= _ "The Ten Guardians"
		description= _ "Some time after, Elynia came back to life as the <b>Guardian of Earth</b> on Irdya. Despite her godlike potential, she has been unable to make proper use of her power due to a complete lack of understanding of her situation—her <i>curse</i>—coupled with an intense pain beyond description."
	[/additional_info]
#endif
[/character_profile]

[character_profile]
	id=Elyssa
	# po: Keep "Chaos Warlord" gender-ambiguous if your language allows it.
	name= _ "female^Chaos Warlord"
	affiliation= _ "Chaos Empire"
	race=shaxthal
	gender=female
#ifdef CAMPAIGN_INVASION_FROM_THE_UNKNOWN
	portrait="portraits/elyssa+masked.webp"
	help_unit_type=Chaos Warlord
	requires_milestone=warlord_encountered
#else
	portrait="portraits/elyssa.webp"
	help_unit_type=Shaxthal Warlord Elyssa
#endif
	description= _ "Evidence suggests that this seemingly half-machine, half-human creature serves as the Chaos Emperor’s right hand, enforcing his will and instilling fear and respect into his enemies and servants alike even in his absence."

	[additional_info]
		requires_milestone=elyssa_revealed_iftu
		name= _ "Elyssa, the Chaos Warlord"
		additional_titles= _ "Fire of Uria"
		affiliation= _ "Chaos Empire’s Iron Council"
		portrait="portraits/elyssa.webp"
	[/additional_info]

	[additional_info]
		requires_milestone=elyssa_defeated
		# po: Keep "Chaos Warlord" gender-ambiguous if your language allows it.
		description= _ "Following her defeat at the hands of the Lady of Light and Mal Keshar, the Chaos Warlord revealed herself to be <b>Elyssa</b>, a former scholar who dedicated her life to studying the ancient Wesnoth Empire’s history. Additional information from the dwarves of Herthgar indicates that a Red Mage matching her description once journeyed alongside Kalehssar’s people and spent time with the dwarves of Gnalvarden before disappearing back into the sands. It is currently unknown what events resulted in her transformation into the monstrous biomechanical demon she is now.

Following Anlindë's self-sacrifice in the capital of Herthgar, Elyssa confronted the heroes in the lower levels of the Heart and nearly won, were it not for Elynia’s use Light magic to temporarily blind her in order to escape and regroup. Although Elyssa eventually found the band again, by then Elynia and Mal Keshar had figured out how to channel the Darkness magic radiating from the Chaos fortress in order to empower themselves with the Union of Light and Darkness. After forcing Elyssa to retreat and regroup multiple times, the duo managed to defeat the demoness in direct combat, but Elynia chose at the last moment to spare her life rather than execute her."
	[/additional_info]

#ifdef CAMPAIGN_AFTER_THE_STORM_EPISODE_III
	[additional_info]
		requires_milestone=elyssa_revealed_ats
		additional_titles= _ "Guardian of Darkness, Fire of Uria"
	[/additional_info]

	[additional_info]
		requires_milestone=zhangor_revealed
		name= _ "Elyssa, the Guardian of Darkness"
		# po: Keep "Chaos Warlord" gender-ambiguous if your language allows it.
		additional_titles= _ "Chaos Warlord, Fire of Uria"
		affiliation= _ "Chaos Empire’s Iron Council (formerly)"
	[/additional_info]
#endif
[/character_profile]

[character_profile]
    id=Argan
    name= _ "Argan, the Master of Darkness"
#ifdef CAMPAIGN_INVASION_FROM_THE_UNKNOWN
	requires_milestone=elynia_encountered
#endif
    race=human
    gender=male
	status=dead
    description= _ "Better known by elves and humans as the <b>Master of Darkness</b> throughout history before the Fall, <b>Argan</b> is one of the two heroes that once wielded the Union of Light and Darkness against Irdya’s greatest foe, the <b>Demon Lord Zhangor</b>.

Very few records exist of Argan’s past life, and absolutely none of his story before first encountering <b>Elynia</b>, the one who would eventually become his lover and co-wielder of the Union. Past elven scholars would even dare suggest that he was not really from the Great Continent, owing to his sudden appearance and lack of knowledge about the world at the time."+"

"+{PROFILE_ELYNIA_ARGAN_SHARED_BITS}

    [additional_info]
        requires_milestone=emperor_defeated
		name= _ "Argan, the Chaos Emperor"
		additional_titles= _ "Master of Darkness, Voice of Uria, Mal-Zagarn"
		affiliation= _ "Chaos Empire’s Iron Council"
		race=shaxthal
#ifdef CAMPAIGN_INVASION_FROM_THE_UNKNOWN
		portrait="portraits/master-drone.webp"
		help_unit_type=Master of Darkness
#endif
#ifdef CAMPAIGN_AFTER_THE_STORM
		portrait="portraits/argan+unmasked.webp"
#endif
        description= _ "Owing to twisted machinations of fate, Argan became Uria’s most valued vassal and took upon the title of <b>Chaos Emperor</b> in this era on Irdya.

Following his accident in the Heart Mountains, Argan was somehow found by Uria and reshaped into a humanoid biomechanical creature wielding a fragment of her power, becoming her anointed Voice on Irdya. Aided by the power of demons from Inferno, he united the peoples of the Great Desert and various coastal regions into one Chaos Empire, with the ultimate aim of subduing and encompassing all of Irdya."+"

"+{PROFILE_ELYNIA_ARGAN_SHARED_BITS_2}
    [/additional_info]
[/character_profile]

[character_profile]
	id=Uria
	name= _ "Uria"
#ifdef CAMPAIGN_INVASION_FROM_THE_UNKNOWN
	requires_milestone=uria_1
#endif
	additional_titles= _ "Mother of All Demons"
	affiliation= _ "Chaos Empire"
	race=demon
	gender=female
	description= _ "The soldiers and demons at the Chaos Empire’s service mention <b>Uria</b> very often, referring to her as an unforgiving yet highly-respected goddess. Past records do seldom mention one such Uria, claimed to be the <b>Mother of All Demons</b>, the creator of all monsters who were once relegated to <b>Inferno</b>."

	[additional_info]
		requires_milestone=emperor_defeated
		name= _ "Uria, the Guardian of Life"
		additional_titles= _ "Mother of All Demons, Goddess of Life, Mistress of the Void"
		affiliation= _ "The Ten Guardians, Chaos Empire"
		description= _ "It turns out that Uria is not only real, but also unlike Yechnagoth she is very much alive and active within her domain. She is occasionally identified as the <b>Guardian of Life</b>, one of ten powerful demons of old with godlike powers over the different aspects of the universe.

The late <b>Chaos Emperor Argan</b> served as her <b>Voice</b>, her emissary and highest authority on Irdya; the one in charge of communicating her will to the <b>Iron Triad</b> and the Lorekeepers of the Empire.

Upon realizing that Argan might not win the fight against Galas’s group on his own, Uria attempted to turn the tide by mutating and puppeteering his body."
	[/additional_info]

	[additional_info]
		requires_milestone=Invasion_from_the_Unknown
		description= _ "She subsequently attempted the same tactic by turning <b>Lédinor</b> into a thrall during the group’s escape from the collapsing capital."
	[/additional_info]
[/character_profile]
