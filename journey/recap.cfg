#textdomain wesnoth-Naia

[story_recap]
	id="UtBS"
	title= _ "Under the Burning Suns"
	text= _ "One fateful night, the young <b>Kalehssar</b> of the <b>Quenoth elves</b> hears the voice of the goddess <b>Eloh</b> in his sleep, warning him of a great disaster that will require him to lead his people out of the desert under her guidance. He is then abruptly woken up by utter pandemonium as rocks rain from the sky, laying waste to the elves’ home in the desert and ending many lives.

With Kaleh turning out to be the closest surviving relative of their late leader Tanuil, and necromancers and other barbarians threatening to take advantage of the chaos and finish them off, the desert elves rally under his command and accept his instruction to lead an exodus across the sands in search of a new home.

After a long and treacherous journey through the desert, the Quenoth elves arrive at a mountain range. Kaleh has once again been visited by their goddess in his dreams and been advised to lead his people underground to get past the mountains. Despite some initial reluctance, the elves descend into the depths, braving many obstacles along the way but also making new steadfast allies in the darkness.

As he and his people finally reach the surface, Kaleh is visited by the goddess again; this time she manifests not in his dreams, but while he is wide awake in the physical realm. The encounter quickly turns sour once Eloh notices that the elf has not only opted not to exterminate the denizens of the underground like she planned, but even gone as far as to befriend them. The leader of a troop of humans arrives and suspects the Quenoth elves of slaughtering his kinsmen despite them arriving to the surface after the fact. When the human announces his decision to bring the elves to the <b>Iron Council</b> for judgment, Eloh commands Kaleh to submit to their will; sensing something amiss, Kaleh refuses, earning him the scorn of Eloh and the humans both, and igniting an armed confrontation with the latter as the goddess vanishes.

Some time after the elves have successfully repelled the human soldiers, a scouting party returns with a bizarre aquatic creature communicating his leader’s desire to speak in person with Kaleh. Soon, the elves learn that the creature is a merman, and an emissary of the high priestess of his people. As the merfok appear to know crucial information about Kaleh’s predicament, he agrees to help the merman rescue his brethren, who are being held captive for ritual sacrifice by the humans.

Soon, the elves successfully infiltrate the Iron Council’s coastal settlement in Ygriz, managing to rescue some of the merfolk so that they can guide them to their high priestess. Before they can do so, however, Eloh makes a new appearance, this time visible to everyone; she reveals Kaleh’s disobedience and betrayal to all, and successfully turns many of his compatriots against him. In order to quell the ensuing dispute and avoid further bloodshed, Kaleh sneaks past the rebels’ forces and destroys the physical avatar of Eloh, declaring her a mere impostor intent on sowing discord amongst the elves to accelerate their destruction.

Kaleh’s people commandeer some of the ships at the Iron Council’s headquarters and sail off the Great Continent into the open ocean, where they finally meet the high priestess <b>Melusand</b> of the merfolk. The mermaid reveals the truth behind the impostor: she turns out to be a dark goddess able to corrupt and control the minds of creatures, with faerie beings such as elves and merfolk being the most naturally resistant to her influence; her name is <b>Yechnagoth, the Eater of Souls</b>.

Well aware that the goddess already has set her sights on them and confrontation is inevitable no matter where they go next, Kaleh and his friends decide to lead an all-out assault on Yechnagoth’s residence in <b>Zocthanol Isle</b> with the merfolk’s assistance. Once they take most of her defensive forces down, the false Eloh makes a new appearance and invites Kaleh to join her for a personal audience at her citadel. Despite his friends’ protests, he acquiesces and heads into Eloh’s sanctum alone; this does not stop them from secretly following him, however.

Inside Yechnagoth’s lair, Kaleh’s friends find him seemingly unconscious on the ground, while the goddess shows them how she is able to brainwash even elves now that they are all gathered in her own dominion. Kaleh stands up and seemingly obeys Yechnagoth’s command, only to stab her in an act of defiance the moment he is close enough to her. After a brief confrontation with the brainwashed elves, the enraged goddess reveals her true form, that of a colossal, twisted, dark abomination with no discernible body features other than veins brimming with teal blood. Despite facing a creature unlike anything they had ever seen before, Kaleh and his group prevail against her and her progeny, destroying her and releasing her armies from her control; thus the Eater of Souls’ brief reign on Irdya comes to an end.

The Quenoth elves proceed to clean up the now-abandoned island, renaming it <b>Quenoth Isle</b>, and adopting it as their new permanent home."
[/story_recap]
