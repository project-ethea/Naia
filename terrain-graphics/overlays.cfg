# wmllint: no translatables

#define FOG_SIMPLE TERRAIN
#arg PROB
	100
#endarg
#arg LAYER
	0
#endarg
#arg FLAG
	overlay
#endarg
#arg IPF
#endarg
	[terrain_graphics]
        map="
, *
* , *
, 1
* , *
, *"
        [tile]
            pos=1
            type={TERRAIN}
            set_no_flag={FLAG}
        [/tile]

        probability={PROB}

        [image]
			# No need to make this modifiable, there is only one fog
            name=fog/fog@V.png{IPF}
			# Wesnoth ships fog1.png instead of fog.png, hence the deviation
			# from the convention of having the first variant lack a sequence
			# number. This is also the only real justification for not using
			# NEW:OVERLAY like everyone else does... <3
            variations="1;2;3"
            layer={LAYER}
            base=90,160
            center=90,144
        [/image]
    [/terrain_graphics]
#enddef

