# wmllint: no translatables
#
# Additional rail transitions for use with barrier overlays
#
# Yes, this is all very hacky and doesn't remove the rail tip graphics, which
# causes rails to gain a tiny visible bump in the middle around an edge of the
# gap terrain tile. However, for the time being this is a perfectly acceptable
# solution for my use case, with the bonus that it doesn't require me to enroll
# at the TerrainGraphicsWML university <3 -- Iris 2026-02-05
#
#define RAIL_GAP_FIX GAP1 RAIL1 GAP2 RAIL2 GAP3 RAIL3
#arg LAYER
-80#endarg
[terrain_graphics]
	map="
,  *
2,   *
,  1
*,   2
,  *
"
	[tile]
		pos=1
		type={GAP1}
	[/tile]
	[tile]
		pos=2
		type={RAIL1}
	[/tile]
	[image]
		name=misc/rails-se-nw.png
		center=90,144
		layer={LAYER}
	[/image]
[/terrain_graphics]

[terrain_graphics]
	map="
,  2
*,   *
,  1
*,   *
,  2
"
	[tile]
		pos=1
		type={GAP2}
	[/tile]
	[tile]
		pos=2
		type={RAIL2}
	[/tile]
	[image]
		name=misc/rails-n-s.png
		center=90,144
		layer={LAYER}
	[/image]
[/terrain_graphics]

[terrain_graphics]
	map="
,  *
*,   2
,  1
2,   *
,  *
"
	[tile]
		pos=1
		type={GAP3}
	[/tile]
	[tile]
		pos=2
		type={RAIL3}
	[/tile]
	[image]
		name=misc/rails-ne-sw.png
		center=90,144
		layer={LAYER}
	[/image]
[/terrain_graphics]
#enddef

# Impassable overlay
{RAIL_GAP_FIX *^Xo   *^Br\ *^Xo                 *^Br| *^Xo   *^Br/}
# Gate
{RAIL_GAP_FIX *^Pr/* *^Br\ *^Pr\*,*^Pr|*,*^Pr/* *^Br| *^Pr\* *^Br/}
# Wooden gate
{RAIL_GAP_FIX *^Pw/* *^Br\ *^Pw\*,*^Pw|*,*^Pw/* *^Br| *^Pw\* *^Br/}
# Event gate
{RAIL_GAP_FIX *^Zz/* *^Br\ *^Zz\*,*^Zz|*,*^Zz/* *^Br| *^Zz\* *^Br/}
