#define BUG _MESSAGE
    [bug]
        message={_MESSAGE}
    [/bug]
#enddef

#define BUG_ON _CONDITION _MESSAGE
    [bug]
        message={_MESSAGE}
        [condition]
            {_CONDITION}
        [/condition]
    [/bug]
#enddef

#define DIE _MESSAGE
    [bug]
        message={_MESSAGE}
        may_ignore=no
    [/bug]
#enddef

#define DIE_ON _CONDITION _MESSAGE
    [bug]
        message={_MESSAGE}
        may_ignore=no
        [condition]
            {_CONDITION}
        [/condition]
    [/bug]
#enddef

#
# Quick mid-event gamestate inspector invocation macro.
# Only useful for internal debugging, so it's not used in published code.
#
#define !
    #warning Inspector call
    [inspect][/inspect]
#enddef

#define LOG_NAIA_ERR _MSG
    {ERROR ("[Naia] "+{_MSG})}
#enddef

#define LOG_NAIA_WRN _MSG
    {WARNING ("[Naia] "+{_MSG})}
#enddef

#define LOG_NAIA_WARN _MSG
    {WARNING ("[Naia] "+{_MSG})}
#enddef

#define LOG_NAIA _MSG
    {LOG ("[Naia] "+{_MSG})}
#enddef

#ifdef DEBUG
#define LOG_NAIA_DBG _MSG
    {DEBUG ("[Naia] "+{_MSG})}
#enddef
#else
#define LOG_NAIA_DBG _MSG
    {LOG ({_MSG})}
#enddef
#endif

#define REGISTER_DEBUG_TRIGGERS _WML
    [event]
        # Has to be a preload event because we don't persist any of this
        # information otherwise, it's 100% Lua runtime state.
        name=preload
        first_time_only=no
        [register_debug_trigger]
            {_WML}
        [/register_debug_trigger]
    [/event]
#enddef

#define DEBUG_TRIGGER _EVT_NAME _LABEL
    [trigger]
        event_name={_EVT_NAME}
        label={_LABEL}
    [/trigger]
#enddef
