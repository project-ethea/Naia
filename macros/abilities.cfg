#textdomain wesnoth-Naia

# wmlindent: start ignoring

# wmllint: unbalanced-on

#
# Used as a convenience wrapper to include ability implementation details in
# unit type definitions without copy-pasting the close-reopen tag boilerplate.
# This requires that the macro actually holding the event WML for the ability
# is named ABILITY_<suffix>_EVENTS:
#
#   [dummy]
#      id=awesome_aura
#   [/dummy]
#
#   {ABILITY_EVENTS AWESOME_AURA} # includes ABILITY_AWESOME_AURA_EVENTS
#
#define ABILITY_EVENTS _SUFFIX
    # wmlxgettext: [abilities]
    [/abilities]
    {ABILITY_{_SUFFIX}_EVENTS}
    [+abilities]
    # wmlxgettext: [/abilities]
#enddef

# wmllint: unbalanced-off

# all forest terrains (tree, mushroom)
#define VEGETATED_TERRAINS
*^F*, T*, T*^*, *^T*, *^Qhhf,*^Qhuf #enddef

#define NOTES_VEGETATED_TERRAINS
    "

"+_ "Note: Vegetated terrains include forest, great tree, and mushroom grove hexes."#enddef

# This is more restrictive than VEGETATED_TERRAINS on purpose
#define ABILITY_STEALTH:FOREST_TERRAINS
*^F*,*^Qhhf,*^Qhuf #enddef

# wmlindent: stop ignoring

#define ABILITY_OBSCURE
    [illuminates]
        id=obscure
        value=-25
        min_value=-25
        cumulative=no
        name= _ "obscures"
        description= _ "This unit darkens the surrounding area, making chaotic units fight better, and lawful units fight worse.

Any units adjacent to this unit will fight as if it were dusk when it is day, and as if it were night when it is dusk."
        special_note={SPECIAL_NOTE_OBSCURE}
        affect_self=yes
    [/illuminates]
#enddef

#define ABILITY_DISENGAGE
    [dummy]
        id=disengage
        name= _ "disengage"
        female_name= _ "female^disengage"
        description= _ "If this unit doesn’t move before attacking, it will retain its movement points after the attack."
        special_note={SPECIAL_NOTE_DISENGAGE}
    [/dummy]

    {ABILITY_EVENTS DISENGAGE}
#enddef

#define ABILITY_TACTICIAN
    [leadership]
        id=tactician
        value="(max(15, 30 * (level - other.level)))"
        cumulative=no
        name= _ "tactician"
        female_name= _ "female^tactician"
        description= _ "This unit can lead other troops in battle.

All adjacent lower-level units from the same side deal 30% more damage for each difference in level, while units of the same level deal 15% more damage."
        special_note={SPECIAL_NOTE_TACTICIAN}
        affect_self=no
        [affect_adjacent]
            [filter]
                formula="level <= other.level"
            [/filter]
        [/affect_adjacent]
    [/leadership]
#enddef

#define ABILITY_STEALTH
    [hides]
        id=stealth
        name= _ "stealth"
        female_name= _ "female^stealth"
        description= _ "This unit can hide in certain terrain, and remain undetected by its enemies.

Enemy units cannot see this unit while it is hiding in certain terrain, except if they have units next to it. The player is able to select which terrain class to target with this ability by right-clicking the unit before it moves or engages in combat on any turn, as long as it is not adjacent to an enemy unit.

Any enemy unit that first discovers this unit immediately loses all its remaining movement."
        special_note={SPECIAL_NOTE_STEALTH}
        affect_self=yes
        [filter]
            lua_function="naia_stealth_unit_filter"
        [/filter]
    [/hides]
#enddef

#define ABILITY_SYLVAN_SPARK
    [regenerate]
        value=5
        id=sylvan_spark
        name= _ "sylvan spark"
        description=_ "While in vegetated terrains, the unit will heal itself 5 HP per turn. If it is poisoned, it will remove the poison instead of healing."+{NOTES_VEGETATED_TERRAINS}
        special_note={SPECIAL_NOTE_SYLVAN_SPARK}
        affect_self=yes
        [filter_self]
            [filter_location]
                terrain={VEGETATED_TERRAINS}
            [/filter_location]
        [/filter_self]
        poison=cured
    [/regenerate]
#enddef

#
# Protection
#

#define ABILITY_PROTECTION
    [resistance]
        id=protection
        add=20
        max_value=50
        apply_to=blade,pierce,impact,fire,cold,arcane
        name= _ "protection"
        description= _ "Adjacent units of lower level from this side receive a +20% bonus to all resistances (up to a maximum of 50%)."
        affect_self=no
        [filter_base_value]
            less_than=50
        [/filter_base_value]
        [affect_adjacent]
            [filter]
                formula="level < other.level"
            [/filter]
        [/affect_adjacent]
    [/resistance]
#enddef

#
# Terror
#

#define ABILITY_TERROR
    [leadership]
        id=terror
        value="(-(15 * (level - other.level) + 15))"
        cumulative=no
        name= _ "terror"
        description= _ "This unit can frighten enemy units that are next to it, making them fight worse.

Adjacent enemy units of lower level will do less damage in battle. When an enemy unit of lower level is adjacent and engages in combat, its attacks do 15% less damage times the difference in their levels + 15%."
        special_note={SPECIAL_NOTE_PROTECTION}
        affect_self=no
        affect_allies=no
        affect_enemies=yes
        [affect_adjacent]
            [filter]
                formula="level < other.level"
            [/filter]
        [/affect_adjacent]
    [/leadership]
#enddef

#define ABILITY_SHROUD
    [resistance]
        id=shroud
        name= _ "shroud"
        description= _ "While defending, this unit has 50% fire and arcane resistance."
        affect_self=yes
        active_on=defense
        value=50
        max_value=50
        apply_to=fire,arcane
    [/resistance]
#enddef

#define ABILITY_BORE
    [hides]
        id=bore
        name= _ "bore"
        female_name= _ "female^bore"
        description= _ "If somehow forced to move into cave or stone walls, this unit can hide inside them and deal 50% more damage on defense.

Enemy units cannot see this unit while it is inside walls, except if they have units next to it. Any enemy unit that first discovers this unit immediately loses all its remaining movement."
        special_note={SPECIAL_NOTE_BORE}
        affect_self=yes
        [filter]
            [filter_location]
                terrain=Xo*,Xo*^*,Xu*,Xu*^*
            [/filter_location]
        [/filter]
    [/hides]

    [damage]
        id=bore_ws
        active_on=defense
        apply_to=self
        [filter_self]
            [filter_location]
                terrain=Xo*,Xo*^*,Xu*,Xu*^*
            [/filter_location]
        [/filter_self]
        value="( base_value * 1.5 )"
    [/damage]
#enddef

#define ABILITY_ZEAL
    [resistance]
        id=zeal
        name= _ "zeal"
        female_name= _ "female^zeal"
        description= _ "The zeal of this unit inspires adjacent units to resist enemy attacks better and deal increased damage.

Adjacent own units of lower level will receive a +30% bonus to their resistances while defending, up to a maximum of 60% for non-arcane damage, or 30% for arcane damage. They will also deal 15% more damage times the difference in their levels on both defense and offense."
        special_note={SPECIAL_NOTE_ZEAL}
        affect_self=no
        apply_to=blade,pierce,impact,fire,cold
        add=30
        max_value=60
        [filter_base_value]
            less_than=60
        [/filter_base_value]
        [affect_adjacent]
            [filter]
                formula="level < other.level"
            [/filter]
        [/affect_adjacent]
    [/resistance]

    [resistance]
        id=zeal_res_arcane
        affect_self=no
        apply_to=arcane
        add=30
        max_value=30
        [filter_base_value]
            less_than=30
        [/filter_base_value]
        [affect_adjacent]
            [filter]
                formula="level < other.level"
            [/filter]
        [/affect_adjacent]
    [/resistance]

    [leadership]
        id=zeal_dmg_bonus
        affect_self=no
        value="(15 * (level - other.level))"
        cumulative=no
        [affect_adjacent]
            [filter]
                formula="level < other.level"
            [/filter]
        [/affect_adjacent]
    [/leadership]
#enddef

# NOTE: This definition of malice is intentionally different to 1.18 DiD's in
# some respects, since it's intended to fit Mal Keshar at different levels,
# with his unit type being either level 3, 4, or 5 in practice.
#define ABILITY_MALICE
    [leadership]
        id=malice
        value="(10 * max(level - 1, 1))"
        cumulative=no
        affect_self=no
        name= _ "malice"
        description= _ "This unit increases the damage of nearby undead units by a percentage equivalent to ten times its own level minus one, or at least 10% — i.e. 10% at levels 0, 1 and 2; 20% at level 3, 30% at level 4."
        special_note={SPECIAL_NOTE_MALICE}
        [affect_adjacent]
            adjacent=n,ne,se,s,sw,nw
            [filter]
                race=undead
            [/filter]
        [/affect_adjacent]
    [/leadership]
#enddef

#define ABILITY_TESTAMENT
    [dummy]
        id=testament
        name= _ "testament"
        description= _ "Upon the death of this unit, any wounded adjacent allies below 50% of their total HP will be healed back to said amount, although any negative status effects will not be removed. Additionally, if the unit is standing on clear walkable ground without any obstructions on it, a suitable testament to its existence will take its place."
        special_note={SPECIAL_NOTE_TESTAMENT}
    [/dummy]

    {ABILITY_EVENTS TESTAMENT}
#enddef

#define ABILITY_ENERGIZE_515
    {ABILITY_ENERGIZE:DEFINE energize_515
        5 15 40
        ( _ "energize+5/15%")
        ( _ "This unit heals adjacent allied units possessing the ‘biomechanical’ trait by 5 HP at the start of every turn, and grants them a 15% resistance bonus (up to a maximum of 40%).")
    }
#enddef

#define ABILITY_ENERGIZE_1030
    {ABILITY_ENERGIZE:DEFINE energize_1030
        10 30 70
        ( _ "energize+10/30%")
        ( _ "This unit heals adjacent allied units possessing the ‘biomechanical’ trait by 10 HP at the start of every turn, and grants them a 30% resistance bonus (up to a maximum of 70%).")
    }
#enddef

#define ABILITY_ENERGIZE:DEFINE _ID _HEAL_VAL _RES_VAL _RES_MAX _NAME _DESCRIPTION
    [heals]
        id={_ID}
        name={_NAME}
        description={_DESCRIPTION}
        special_note={SPECIAL_NOTE_ENERGIZE}
        value={_HEAL_VAL}
        affect_allies=yes
        affect_self=no
        poison=slowed
        {ABILITY_ENERGIZE:CONDITIONS}
    [/heals]

    [resistance]
        id={_ID}+"_protection"
        add={_RES_VAL}
        max_value={_RES_MAX}
        apply_to=blade,pierce,impact,fire,cold,arcane
        affect_allies=yes
        affect_self=no
        [filter_base_value]
            less_than={_RES_MAX}
        [/filter_base_value]
        {ABILITY_ENERGIZE:CONDITIONS}
    [/resistance]
#enddef

#define ABILITY_ENERGIZE:CONDITIONS
    [affect_adjacent]
        [filter]
            trait=biomechanical
        [/filter]
    [/affect_adjacent]
#enddef

